<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta do Leitor - Com Efeito Papel Amassado e Carimbo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #b8a99a 0%, #8b7a6b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Times New Roman', Georgia, 'Courier New', serif;
            padding: 40px 20px;
        }

        /* ========== ESTRUTURA DA CARTA COM PAPEL AMASSADO ========== */
        .carta {
            max-width: 700px;
            width: 100%;
            background-color: #fef7e0;
            padding: 50px 45px;
            position: relative;
            
            /* Sombra para dar profundidade */
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            
            /* Borda que imita um papel envelhecido */
            border: 1px solid #d4c5a5;
            border-radius: 4px;
            
            /* TRANSFORMAÇÃO PARA DAR O EFEITO AMASSADO */
            transform: rotate(0.5deg);
            transition: transform 0.3s ease;
        }
        
        /* Efeito de papel amassado - camada de ruído */
        .carta::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.08"/></svg>');
            background-repeat: repeat;
            background-size: 200px;
            pointer-events: none;
            border-radius: 4px;
        }
        
        /* Rugas/amassados visíveis - com sombras internas */
        .carta::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(0,0,0,0.02) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 50%),
                        radial-gradient(ellipse at 45% 85%, rgba(0,0,0,0.015) 0%, transparent 60%),
                        radial-gradient(ellipse at 60% 15%, rgba(0,0,0,0.015) 0%, transparent 50%);
            pointer-events: none;
            border-radius: 4px;
        }

        /* Título da carta */
        .titulo-carta {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #5c4b2e;
            margin-bottom: 30px;
            text-transform: uppercase;
            border-bottom: 2px solid #e2d9cc;
            padding-bottom: 12px;
            position: relative;
            z-index: 2;
        }

        /* Data - alinhada à direita */
        .data {
            text-align: right;
            margin-bottom: 25px;
            font-size: 1rem;
            color: #4a3b24;
            position: relative;
            z-index: 2;
        }

        /* Destinatário */
        .destinatario {
            margin-bottom: 25px;
            font-size: 1rem;
            position: relative;
            z-index: 2;
        }

        /* Corpo da carta */
        .corpo {
            line-height: 1.6;
            font-size: 1.05rem;
            text-align: justify;
            margin-bottom: 35px;
            color: #2c2a26;
            position: relative;
            z-index: 2;
        }

        .corpo p {
            margin-bottom: 18px;
            text-indent: 2.5rem;
        }

        /* Fechamento */
        .fechamento {
            margin-top: 30px;
            text-align: left;
            position: relative;
            z-index: 2;
        }

        .saudacao {
            font-style: italic;
            margin-bottom: 25px;
        }

        .assinatura {
            margin-top: 15px;
            font-weight: bold;
            border-top: 1px dashed #d4c9b6;
            padding-top: 20px;
            width: 280px;
        }

        .nome {
            font-size: 1.1rem;
            font-weight: bold;
            color: #3e2e1a;
        }

        /* ========== ESTILO DO CARIMBO ========== */
        .carimbo {
            position: absolute;
            bottom: 40px;
            right: 45px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(200, 60, 50, 0.15);
            border: 3px double rgba(180, 50, 40, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Courier New', monospace;
            transform: rotate(-12deg);
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        
        /* Texto interno do carimbo */
        .carimbo-texto {
            font-size: 0.7rem;
            font-weight: bold;
            color: #b33a2a;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.3;
        }
        
        .carimbo-texto span {
            font-size: 1rem;
            display: block;
            margin-bottom: 3px;
        }
        
        .carimbo-data {
            font-size: 0.65rem;
            color: #b33a2a;
            margin-top: 5px;
            font-family: monospace;
        }
        
        /* Elemento decorativo de ruga/vinco (opcional) */
        .vinco {
            position: absolute;
            top: 30%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(100,70,40,0.15), transparent);
            transform: rotate(2deg);
            z-index: 1;
            pointer-events: none;
        }
        
        .vinco2 {
            top: 65%;
            left: 15%;
            width: 70%;
            transform: rotate(-3deg);
        }
        
        .destaque {
            font-weight: 500;
            color: #5e4a2c;
        }
        
        /* Efeito de hover para interação (opcional) */
        .carta:hover {
            transform: rotate(0deg);
            transition: transform 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="carta">
        <!-- Vinculos/rugas decorativas -->
        <div class="vinco"></div>
        <div class="vinco vinco2"></div>
        
        <div class="titulo-carta">
            Atividade da faculdade
        </div>

        <div class="data">
            Biguaçu, 23 de março de 2026.
        </div>

        <div class="destinatario">
            Fórum temático,
        </div>

        <div class="corpo">
            <p>
                Estou criando esta carta conforme solicitado pelo professor, que foi solicitado no dia 06/03/2025. 
            </p>
        </div>

        <div class="fechamento">
            <div class="saudacao">
                Atenciosamente,
            </div>
            <div class="assinatura">
                <div class="nome">Lucas Alves de Almeida</div>
            </div>
        </div>
        
        <!-- CARIMBO -->
        <div class="carimbo">
            <div class="carimbo-texto">
                <span>✦ RECEBIDO ✦</span>
               
            </div>
            <div class="carimbo-data">
                23 março 2026
            </div>
        </div>
    </div>
</body>
</html>
